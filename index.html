<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="img/flowers.png" type="image/x-icon">
    <!-- Google Fonts: Playfair Display for elegance, Montserrat for modern feel -->
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap"
        rel="stylesheet">
    <title>Feliz Cumpleaños</title>
</head>

<body>
    <main class="elegant-wrapper">
        <div class="elegant-card">
            <header class="card-header">
                <h1 class="greeting-text">Feliz Cumpleaños</h1>
            </header>

            <section class="card-content">
                <p class="name-display">Carla Mariana</p>
                <div class="divider"></div>
                <p class="subtext">Un detalle especial para ti</p>
            </section>

            <footer class="card-footer">
                <a href="flower.html" class="elegant-btn">
                    <span>Entrar</span>
                </a>
            </footer>
        </div>
    </main>

    <!-- Subtle Decorative Elements -->
    <div class="ambient-glow"></div>

</html>
